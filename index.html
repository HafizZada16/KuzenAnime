<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>KuzenAnime - Streaming Anime Indonesia</title>
    <link rel="icon" type="image/x-icon" href="https://api.kuzen.my.id/favicon.ico">
    
    <link rel="shortcut icon" href="https://api.kuzen.my.id/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#0b0b0b] text-white">
    
    <nav class="sticky top-0 z-50 glass border-b border-gray-800/50 p-3">
        <div class="container mx-auto">
            <div class="flex flex-row justify-between items-center gap-3">
                
                <div class="flex items-center gap-2 cursor-pointer" onclick="app.navigateTo('/')">
                    <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-600/20">
                        <i class="fas fa-play text-white text-xs"></i>
                    </div>
                    <h1 class="text-xl font-black tracking-tighter uppercase">Kuzen<span class="text-purple-500">Anime</span></h1>
                </div>
                
                <div class="hidden md:flex gap-5 text-[10px] font-bold items-center uppercase tracking-wider overflow-x-auto no-scrollbar py-1">
                    <span onclick="app.navigateTo('/')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition">Home</span>
                    <span onclick="app.navigateTo('/ongoing')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition">Ongoing</span>
                    <span onclick="app.navigateTo('/complete')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition">Complete</span>
                    <span onclick="app.navigateTo('/schedule')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition flex items-center gap-1">
                        <i class="far fa-calendar-alt text-[8px]"></i> Schedule
                    </span>
                    <span onclick="app.navigateTo('/genres')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition flex items-center gap-1">
                        <i class="fas fa-ghost text-[8px]"></i> Genres
                    </span>
                    <span onclick="app.navigateTo('/mylist')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition flex items-center gap-1">
                        <i class="fas fa-heart text-[8px] text-purple-500"></i> My List
                    </span>
                    <span onclick="app.navigateTo('/history')" class="hover:text-purple-500 cursor-pointer whitespace-nowrap transition flex items-center gap-1">
                        <i class="fas fa-history text-[8px] text-purple-500"></i> History
                    </span>
                    
                    <div class="relative w-40 ml-2">
                        <input type="text" id="search-input-desktop" placeholder="Cari anime..." 
                            class="bg-gray-900 border border-gray-700 rounded-full px-4 py-1.5 text-[10px] outline-none focus:border-purple-500 w-full text-white transition">
                        <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 text-[8px]"></i>
                    </div>

                    <button id="nav-login-btn" class="ml-4 bg-gray-800 hover:bg-purple-600 border border-gray-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition shadow-sm">
                        <i class="fas fa-sign-in-alt mr-1"></i> Login
                    </button>
                </div>
            </div>

            <div class="mt-3 md:hidden">
                <div class="relative w-full">
                    <input type="text" id="search-input-mobile" placeholder="Cari anime favoritmu..." 
                        class="bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-2.5 text-xs outline-none focus:border-purple-500 w-full text-white transition">
                    <i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6 pb-24 md:pb-6">
        <div id="loading" class="hidden py-40 text-center">
            <div class="inline-block w-10 h-10 border-4 border-purple-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div id="content-display"></div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-[#0b0b0b]/95 backdrop-blur-md border-t border-gray-800 z-50 md:hidden">
        <div class="flex justify-between items-center px-1 py-2">
            
            <a href="#" onclick="event.preventDefault(); window.app.navigateTo('/')" class="flex flex-col items-center p-2 flex-1 text-gray-500 hover:text-purple-500 group transition-colors">
                <i class="fas fa-home text-[18px] mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-wider">Home</span>
            </a>

            <a href="#" onclick="event.preventDefault(); window.app.navigateTo('/ongoing')" class="flex flex-col items-center p-2 flex-1 text-gray-500 hover:text-purple-500 group transition-colors">
                <i class="fas fa-play-circle text-[18px] mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-wider">Ongoing</span>
            </a>

            <a href="#" onclick="event.preventDefault(); window.app.navigateTo('/schedule')" class="flex flex-col items-center p-2 flex-1 text-gray-500 hover:text-purple-500 group transition-colors">
                <i class="fas fa-calendar-alt text-[18px] mb-1"></i>
                <span class="text-[8px] font-black uppercase tracking-wider">Schedule</span>
            </a>

            <a href="#" onclick="event.preventDefault(); window.app.navigateTo('/mylist')" class="flex flex-col items-center p-2 flex-1 text-gray-500 hover:text-purple-500 group transition-colors">
                <i class="fas fa-heart text-[18px] mb-1 text-purple-500"></i>
                <span class="text-[8px] font-black uppercase tracking-wider">My List</span>
            </a>

            <a href="#" onclick="event.preventDefault(); window.app.navigateTo('/history')" class="flex flex-col items-center p-2 flex-1 text-gray-500 hover:text-purple-500 group transition-colors">
                <i class="fas fa-history text-[18px] mb-1 text-purple-500"></i>
                <span class="text-[8px] font-black uppercase tracking-wider">History</span>
            </a>

        </div>
    </nav>

    <script type="module">
        import { showAuthModal, handleLogin, handleRegister, checkAuthUI } from '/js/auth.js';
        import { loadHome, loadCategory, handleSearch } from '/js/home.js';
        import { loadDetail } from '/js/detail.js';
        import { loadPlayer, switchServer, changeQuality } from '/js/player.js';
        import { loadSchedule } from '/js/schedule.js';
        import { loadGenres } from '/js/genres.js';
        import { loadBatch } from '/js/batch.js';
        import { loadMyList } from '/js/mylist.js';
        import { loadHistory } from '/js/history.js'; // Import History

        const navigateTo = (path) => { history.pushState(null, null, path); router(); };
        
        const router = async () => {
            const path = window.location.pathname;
            const params = new URLSearchParams(window.location.search);
            const page = parseInt(params.get('page')) || 1;
            const query = params.get('q');
            
            if (path === '/search' && query) {
                const mobileInput = document.getElementById('search-input-mobile');
                if(mobileInput) mobileInput.value = query;
                await handleSearch();
            }
                
            if (path === '/' || path === '/home') await loadHome();
            else if (path === '/ongoing') await loadCategory('ongoing', page);
            else if (path === '/complete') await loadCategory('complete', page);
            else if (path === '/schedule') await loadSchedule();
            else if (path === '/genres') await loadGenres();
            else if (path === '/mylist') await loadMyList();
            else if (path === '/history') await loadHistory(); // Router History
            else if (path.startsWith('/anime/')) await loadDetail(path.split('/')[2]);
            else if (path.startsWith('/episode/')) await loadPlayer(path.split('/')[2]);
            else if (path.startsWith('/genres/')) await loadGenres(path.split('/')[2]);
            else if (path.startsWith('/batch/')) await loadBatch(path.split('/')[2]);
        }

        window.app = { 
            showAuthModal, handleLogin, handleRegister, navigateTo, loadCategory, 
            handleSearch, loadDetail, loadPlayer, switchServer, changeQuality, 
            loadSchedule, loadGenres, loadBatch, loadMyList, loadHistory 
        };
        
        window.addEventListener('DOMContentLoaded', () => {
            checkAuthUI();
            router();
        });
        
        window.addEventListener('popstate', router); 

        // Sinkronisasi Search
        document.getElementById('search-input-mobile').onkeypress = (e) => { 
            if(e.key === 'Enter') {
                document.getElementById('search-input-desktop').value = e.target.value;
                app.handleSearch(); 
            }
        };

        document.getElementById('search-input-desktop').onkeypress = (e) => { 
            if(e.key === 'Enter') {
                document.getElementById('search-input-mobile').value = e.target.value;
                app.handleSearch(); 
            }
        };
    </script>
</body>
</html>
